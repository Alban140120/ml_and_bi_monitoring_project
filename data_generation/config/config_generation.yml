global:
  daily_nb_rows_per_group: 500
  noise_per_population: 0.05
  target_noise_scale: 0.2
  ratio_churn: 0.03
  ratio_sport: 0.04
  ratio_cinema: 0.04
  groups:
    requests: 
      cols: ['CUST_NUM', 'date', 'churn_target', 'sport_target', 'cinema_target']
    socio_demo:
      cols: ['CUST_NUM', 'date', 'CUST_AGE']
    internet:
      cols: ['CUST_NUM', 'date', 'TRAF_SOCIAL_MEDIA_L3M', 'TRAF_TELCO_L3M', 'TRAF_GAMING_L3M', 'TRAF_PRICE_COMPARATOR_L3M', 'TRAF_KIDS_L3M', 'TRAF_CYCLING_L12M', 'TRAF_FOOTBALL_L12M', 'TRAF_DISNEY_L3M', 'TRAF_NETFLIX_L3M', 'NB_DAYS_INTERNET_LINE']
