      cols: ['CUST_NUM', 'date', 'TV_USAGE_L1M', 'NB_DAYS_TV_LINE', 'TV_FOOTBALL_L12M', 'TV_CYCLING_L12M', 'TV_DOCUMENTARIES_L12M', 'TV_MOVIES_L12M', 'TV_CULTURE_L12M', 'TV_NB_DISINCT_SPORTS_VIEWED_L12M']
    mobile:
      cols: ['CUST_NUM', 'date', 'OUT_OF_BUNDLE_L3M', 'NB_MOBILE_SUBS']
    journeys: 
      cols: ['CUST_NUM', 'date', 'NB_COMPLAINTS_L3M', 'NB_TECHNICAL_ISSUES_L3M', 'NB_ADMINISTRATIVE_ISSUES_L3M']


